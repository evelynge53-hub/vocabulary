.btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 20px; font-size: 14px; cursor: pointer; color: var(--color-text-primary); }

.btn-primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }

.counter { font-size: 13px; color: var(--color-text-secondary); margin-left: auto; }

<h2 class="sr-only" style="position:absolute;left:-9999px">Vocabulary quiz app for units 1, 2, 8, 9, 10</h2>

<div id="screen-select" class="screen active">
  <h2>单词自测</h2>
  <p style="font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem;">选择要练习的单元，或全部混合练习</p>
  <div class="unit-grid" id="unit-grid"></div>
  <div class="nav-row">
    <button class="btn btn-primary" onclick="startQuiz()">开始自测 ↗</button>
    <span id="sel-count" style="font-size:13px;color:var(--color-text-secondary)"></span>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar"></div></div>
  <div class="question-card">
    <div class="unit-badge" id="q-unit"></div>

    <div class="feedback" id="feedback"></div>
  </div>
  <div class="nav-row">
    <button class="btn btn-primary btn-sm" onclick="checkAnswer()">提交</button>

    <span class="counter" id="q-counter"></span>
  </div>
  <div style="margin-top:10px">
    <button class="btn btn-sm" onclick="goHome()">← 返回</button>
  </div>
</div>

<div id="screen-result" class="screen">

  <div class="stat-grid">

    <div class="stat"><div class="stat-num red" id="r-wrong"></div><div class="stat-label">答错/跳过</div></div>

  <div class="missed-list" id="missed-list"></div>
  <div class="nav-row" style="margin-top:1rem">
    <button class="btn btn-primary" onclick="goHome()">重新开始</button>
    <button class="btn" onclick="retryMissed()" id="retry-btn">只练错题 ↗</button>
  </div>
</div>

const units = Object.keys(VOCAB);
let selectedUnits = new Set();
let quizWords = [];
let currentIdx = 0;
let correctCount = 0;
let wrongWords = [];
let revealed = false;
let answered = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function buildUnitGrid() {
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  const allCard = document.createElement('div');
  allCard.className = 'unit-card all-card';
  allCard.id = 'card-all';
  allCard.innerHTML = `<div class="unit-name">全部单元混合</div><div class="unit-count">${Object.values(VOCAB).reduce((a,b)=>a+b.length,0)} 个单词</div>`;
  allCard.onclick = () => toggleAll();
  grid.appendChild(allCard);
  units.forEach(u => {
    const c = document.createElement('div');
    c.className = 'unit-card';
    c.id = 'card-' + u;
    c.innerHTML = `<div class="unit-name">${u}</div><div class="unit-count">${VOCAB[u].length} 个单词</div>`;
    c.onclick = () => toggleUnit(u);
    grid.appendChild(c);
  });
}

function toggleAll() {
  const allSelected = selectedUnits.size === units.length;
  if (allSelected) {
    selectedUnits.clear();
  } else {
    units.forEach(u => selectedUnits.add(u));
  }
  updateGrid();
}

function toggleUnit(u) {
  if (selectedUnits.has(u)) selectedUnits.delete(u);
  else selectedUnits.add(u);
  updateGrid();
}

function updateGrid() {
  units.forEach(u => {
    const c = document.getElementById('card-' + u);
    c.classList.toggle('selected', selectedUnits.has(u));
  });
  const allCard = document.getElementById('card-all');
  allCard.classList.toggle('selected', selectedUnits.size === units.length);
  const total = [...selectedUnits].reduce((a, u) => a + VOCAB[u].length, 0);
  document.getElementById('sel-count').textContent = selectedUnits.size > 0 ? `已选 ${total} 个单词` : '';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz(words) {
  if (!words) {
    if (selectedUnits.size === 0) {
      alert('请先选择至少一个单元');
      return;
    }
    quizWords = [];
    selectedUnits.forEach(u => VOCAB[u].forEach(w => quizWords.push({...w, unit: u})));
    shuffle(quizWords);
  } else {
    quizWords = shuffle([...words]);
  }
  currentIdx = 0;
  correctCount = 0;
  wrongWords = [];
  showQuestion();
  show('quiz');
}

function showQuestion() {
  const q = quizWords[currentIdx];
  revealed = false;
  answered = false;
  document.getElementById('q-unit').textContent = q.unit;
  document.getElementById('q-hint').textContent = q.h;
  document.getElementById('q-def').textContent = q.d;
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = 'answer-input';
  inp.disabled = false;
  inp.focus();
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  const pct = (currentIdx / quizWords.length) * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${currentIdx + 1} / ${quizWords.length}`;
}

function checkAnswer() {
  if (answered) { nextWord(); return; }
  const inp = document.getElementById('answer-input');
  const userAns = inp.value.trim().toLowerCase();
  const correct = quizWords[currentIdx].w.toLowerCase();
  if (!userAns) return;
  answered = true;
  if (userAns === correct) {
    inp.className = 'answer-input correct';
    document.getElementById('feedback').textContent = '✓ 正确！';
    document.getElementById('feedback').className = 'feedback correct';
    correctCount++;
    setTimeout(nextWord, 800);
  } else {
    inp.className = 'answer-input wrong';
    document.getElementById('feedback').textContent = `✗ 正确答案: ${quizWords[currentIdx].w}`;
    document.getElementById('feedback').className = 'feedback wrong';
    wrongWords.push(quizWords[currentIdx]);
  }
}

function skipWord() {
  if (!answered) {
    wrongWords.push(quizWords[currentIdx]);
  }
  nextWord();
}

function revealAnswer() {
  if (answered) return;
  answered = true;
  const inp = document.getElementById('answer-input');
  inp.value = quizWords[currentIdx].w;
  inp.className = 'answer-input wrong';
  inp.disabled = true;
  document.getElementById('feedback').textContent = `答案: ${quizWords[currentIdx].w}`;
  document.getElementById('feedback').className = 'feedback wrong';
  wrongWords.push(quizWords[currentIdx]);
}

function nextWord() {
  currentIdx++;
  if (currentIdx >= quizWords.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  show('result');
  document.getElementById('r-total').textContent = quizWords.length;
  document.getElementById('r-correct').textContent = correctCount;
  document.getElementById('r-wrong').textContent = quizWords.length - correctCount;
  const missed = document.getElementById('missed-list');
  const label = document.getElementById('missed-label');
  const retryBtn = document.getElementById('retry-btn');
  if (wrongWords.length === 0) {
    label.textContent = '太棒了，全部答对！';
    missed.innerHTML = '<div style="padding:12px;color:var(--color-text-secondary);font-size:14px;text-align:center">🎉 完美！</div>';
    retryBtn.style.display = 'none';
  } else {
    label.textContent = `需要复习的单词（${wrongWords.length} 个）`;
    retryBtn.style.display = '';
    missed.innerHTML = wrongWords.map(w =>
      `<div class="missed-item"><div class="missed-word">${w.w} <span style="color:var(--color-text-secondary);font-weight:400;font-size:12px">${w.unit}</span></div><div class="missed-def">${w.d}</div></div>`
    ).join('');
  }
}

function retryMissed() {
  startQuiz(wrongWords.map(w => ({...w})));
}

function goHome() { show('select'); }

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});

buildUnitGrid();
</script>
